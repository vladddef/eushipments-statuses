name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS app
        run: npm run build

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/,package.json,package-lock.json,ecosystem.config.js"
          target: "/home/${{ secrets.EC2_USER }}/app"

      - name: Install prod dependencies & restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            cd ~/app
            LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
            if [ ! -d node_modules ] || [ "$LOCK_HASH" != "$(cat .pkg-lock-hash 2>/dev/null)" ]; then
              npm ci --omit=dev
              echo "$LOCK_HASH" > .pkg-lock-hash
            fi
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save
